spring:
  kafka:
    bootstrap-servers: localhost:9092

app:
  kafka:
    topics:
      notification-order-placed: notification-order-placed
      notification-payment-success: notification-payment-success
      user-registration: user-registration

notification:
  mail:
    from: no-reply@digicart.com

spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-gmail-username@gmail.com
    password: your-gmail-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          starttls.required: true

server:
  port: 8089

spring:
  application:
    name: notification-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:digicart.support@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:dzdaffnmsrxdrjeu}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com
  eureka:
    client:
      service-url:
        defaultZone: ${EUREKA_DEFAULT_ZONE:http://service-registry:8761/eureka/}

management:
  health:
    discovery:
      enabled: false
    mail:
      enabled: false
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

notification:
  mail:
    from: your-email@gmail.com

app:
  kafka:
    topics:
      notification-order-placed: notification.order-placed
      notification-payment-success: notification.payment-success

order-service:
  base-url: ${ORDER_SERVICE_BASE_URL:http://order-service:8087}

